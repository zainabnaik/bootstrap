<!DOCTYPE html>
<html lang="en">

<head>
    <title>Typography Example</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</head>

<body>

    <div class="container mt-5">
        <h1 class="text-primary">Heading List</h1>
        <h1 class="display-1">hello world</h1>
        <h2 class="display-2 text-secondary">its a beautifulday</h2>
        <h3 class="display-3 text-success">ummm</h3>
    </div>

    <div class="container mt-3">
        <p>C0<sub>2</sub> (Subscript example)</p>
        <p>a<sup>2</sup> (Superscript example)</p>
    </div>

    <div class="container mt-3">
        <h1 class="text-danger">Highlight Text</h1>
        <p>Use the mark element to <mark>highlight</mark> the text.</p>
        <p class="text-muted">This text is "decorated" to be muted/grey using Bootstrap.</p>
    </div>

</body>

</html>
